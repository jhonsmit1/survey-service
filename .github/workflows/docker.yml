name: Build and Push Docker Image

on:
  push:
    branches:
      - staging
      - production

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/empresa/survey-service:${{ github.ref_name }} .

      - name: Push image
        run: |
          docker push ghcr.io/empresa/survey-service:${{ github.ref_name }}
